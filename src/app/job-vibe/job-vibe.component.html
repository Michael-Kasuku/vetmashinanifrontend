<div class="job-vibe-container">
  <div class="search-box">
      <input 
          type="text" 
          [(ngModel)]="searchPhrase" 
          placeholder="🔍 Search jobs, internships, scholarships..." 
          class="search-input"
          (input)="onInputChange()"
      />
      <button (click)="searchOpportunities()" class="search-button">Search</button>
  </div>

  <div *ngIf="isLoading" class="loading">
    <span class="loader"></span>
    <p>Searching, please wait...</p>
  </div>

  <div *ngIf="errorMessage" class="error-message">
    ❌ {{ errorMessage }}
  </div>

  <!-- Autocomplete suggestions -->
  <div *ngIf="filteredSuggestions.length > 0" class="autocomplete-suggestions">
    <ul>
      <li *ngFor="let suggestion of filteredSuggestions" (click)="selectSuggestion(suggestion)">
        {{ suggestion }}
      </li>
    </ul>
  </div>

  <div *ngIf="results.length > 0" class="results">
    <div *ngFor="let result of results" class="result-item">
      <h3>{{ result.title }}</h3>
      <p class="result-description">{{ result.description }}</p>
      <a [href]="result.url" target="_blank" class="view-button">View Opportunity</a>
    </div>
  </div>
  
  <div *ngIf="results.length === 0 && !isLoading && !errorMessage" class="no-results">
    😞 No relevant opportunities found.
  </div>
</div>
